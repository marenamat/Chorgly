recorded_at: '2026-04-18'
issue: 2
title: Prototype — chorgly backend + frontend

workspace_layout:
  - Cargo.toml: workspace root (members: core, backend, frontend, tools/admin)
  - src/core: chorgly-core — shared Rust types (Chore, User, Database, proto msgs)
  - src/backend: chorgly-backend — tokio async WebSocket server (port 8765, IPv6-first)
  - src/frontend: chorgly-frontend — Rust/WASM lib, encode/decode CBOR messages
  - tools/admin: chorgly-admin — CLI for user management (add/reset-token/list/delete)
  - docs/app.html: app shell (auth screen + chore list + add-chore dialog)
  - docs/app.css: app styles
  - docs/app.js: JS glue (WebSocket, WASM init, DOM render)
  - .github/workflows/build.yml: CI — cargo check + cargo test + wasm-pack build

key_design_decisions:
  - CBOR over WebSocket for all messages (ClientMsg / ServerMsg enums)
  - In-memory DB, flushed to data/db.cbor every hour via git commit in data/ repo
  - Auth: token lookup in DB, checked on every connection; rotate via admin CLI
  - Rate limit: 30 msg/s per client session
  - "Common chore" = assigned_to null; "personal chore" = assigned_to [user_id]
  - Dependency check at completion time (blocked_by helper on Chore)
  - Android = PWA (near-zero extra work, confirmed in design doc)

open_questions: none  # all resolved

